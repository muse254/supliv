name: GTPack Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  gtpack-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.90.0

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2 --toolchain 1.90.0

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install greentic-pack
        run: cargo binstall greentic-pack --force --locked -y

      - uses: oras-project/setup-oras@v1
        with:
          version: "1.2.0"

      - name: Build supliv gtpack
        run: |
          set -euo pipefail
          bash scripts/build_gtpack.sh | tee /tmp/build_gtpack.log

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish supliv gtpack
        env:
          OWNER: muse254
          PACKAGE_NAME: supliv
          SOURCE_ANNOTATION: https://github.com/muse254/package-publish
          REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          bash scripts/publish_gtpack.sh
